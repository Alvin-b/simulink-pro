syntax = "proto3";

package simforge.engine.v1;

message ProjectReference {
  string project_id = 1;
  string scenario_id = 2;
  string document_uri = 3;
}

message EngineDescriptor {
  string engine_id = 1;
  string domain = 2;
  string fidelity = 3;
  repeated string capabilities = 4;
}

message EngineRunRequest {
  string engine_id = 1;
  ProjectReference project = 2;
  map<string, string> parameters = 3;
}

message EngineRunReply {
  string run_id = 1;
  string status = 2;
}

message EngineCatalogReply {
  repeated EngineDescriptor engines = 1;
}

message ArtifactDescriptor {
  string target = 1;
  string board = 2;
  string language = 3;
  string entry_file = 4;
  repeated string interfaces = 5;
}

message ArtifactValidationReply {
  string status = 1;
  bool compatible = 2;
  repeated string warnings = 3;
}

message TelemetrySample {
  string run_id = 1;
  string channel = 2;
  string payload_json = 3;
  string timestamp = 4;
}

service EngineControl {
  rpc ListEngines(ProjectReference) returns (EngineCatalogReply);
  rpc StartRun(EngineRunRequest) returns (EngineRunReply);
  rpc PublishTelemetry(TelemetrySample) returns (EngineRunReply);
  rpc ValidateArtifact(ArtifactDescriptor) returns (ArtifactValidationReply);
}
